{{define "notes_edit.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Note - Aslam</title>
    {{template "style"}}
    <style>
        .edit-form label {
            display: block;
            margin-top: 16px;
            font-size: 0.9em;
            font-weight: bold;
        }
        .edit-form input, .edit-form textarea {
            width: 100%;
            padding: 8px;
            margin-top: 4px;
            border: 1px solid #999;
            border-radius: 4px;
            font-family: inherit;
        }
        .edit-form textarea {
            min-height: 200px;
        }
        .edit-form .buttons {
            margin-top: 24px;
            display: flex;
            gap: 12px;
        }
        .edit-form button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .edit-form button[type="submit"] {
            background: #000;
            color: #fff;
        }
        .edit-form .delete-btn {
            background: #fee;
            color: #c00;
        }
    </style>
</head>
<body>
    <div class="app">
        {{template "header" .}}
        <main class="app-content">
            <h2>Edit: {{.Item.Title}}</h2>
            {{if .IsOwner}}
            <div style="margin: -4px 0 12px 0;">
                <button onclick="toggleNotePublic()" id="public-toggle" style="font-size:12px; padding:4px 10px; border:1px solid #ddd; border-radius:4px; background:{{if .Item.Public}}#22c55e{{else}}#fff{{end}}; color:{{if .Item.Public}}#fff{{else}}#666{{end}}; cursor:pointer;">
                    {{if .Item.Public}}Public{{else}}Private{{end}}
                </button>
            </div>
            <script>
            async function toggleNotePublic() {
                const btn = document.getElementById('public-toggle');
                const isPublic = btn.textContent.trim() === 'Public';
                await fetch('/api/notes/toggle-public', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({id: {{.Item.ID}}, public: !isPublic})
                });
                location.reload();
            }
            </script>
            {{end}}
            <p class="muted" style="margin-bottom: 20px"><a href="/notes">&larr; back to notes</a></p>

            <form action="/notes/edit/{{.Item.ID}}" method="POST" class="edit-form">
                <label>Title
                    <input type="text" name="title" value="{{.Item.Title}}" required>
                </label>
                <label>Content
                    <textarea name="content">{{.Item.Content}}</textarea>
                </label>
                <div class="buttons">
                    <button type="submit">Save Changes</button>
                    <a href="/notes"><button type="button">Cancel</button></a>
                </div>
            </form>

            <form action="/notes/delete/{{.Item.ID}}" method="POST" style="margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border-color);">
                <p class="muted">Danger zone</p>
                <button type="submit" class="delete-btn" onclick="return confirm('Delete this note permanently?')">Delete Note</button>
            </form>
        </main>
    </div>
</body>
</html>
{{end}}
