{{define "notes.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes - Aslam</title>
    {{template "style"}}
    <style>
        .note-form {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 24px;
        }
        .note-form input[type="text"] {
            font-size: 16px;
            font-weight: 500;
            padding: 10px 14px;
            border: 1px solid #999;
            border-radius: 8px;
        }
        .note-form textarea {
            min-height: 80px;
            max-height: 300px;
            padding: 10px 14px;
            resize: vertical;
            font-size: 14px;
            font-family: inherit;
            line-height: 1.6;
            border: 1px solid #999;
            border-radius: 8px;
        }
        .note-form textarea:focus, .note-form input:focus { outline: none; border-color: #333; }
        .note-form button {
            padding: 8px 20px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            align-self: flex-end;
        }
        .note-form button:hover { background: #333; }
        .notes-grid { display: grid; gap: 12px; }
        .note-item {
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 14px;
        }
        .note-item h3 { margin: 0 0 4px 0; font-size: 15px; }
        .note-item .description { color: #666; font-size: 13px; margin-bottom: 6px; }
        .note-item .meta { font-size: 12px; color: #999; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="app">
        {{template "header" .}}
        <main class="app-content">
            <h2>Notes</h2>

            <form class="note-form" action="/notes/add" method="POST">
                <input type="text" name="title" required placeholder="Title" autofocus>
                <textarea name="content" placeholder="Write your note..."></textarea>
                <button type="submit">Save</button>
            </form>

            {{if .Items}}
            <div class="notes-grid">
                {{range .Items}}
                <div class="note-item">
                    <h3>{{.Title}}</h3>
                    {{if .Content}}<div class="description">{{truncate .Content 200}}</div>{{end}}
                    <div class="meta">
                        <span data-time="{{.UpdatedAt.Unix}}"></span>
                        · <a href="/notes/edit/{{.ID}}">edit</a>
                    </div>
                </div>
                {{end}}
            </div>
            {{else}}
            <p class="muted">No notes yet.</p>
            {{end}}
        </main>
    </div>
    <script>
    function timeAgo(timestamp) {
        const seconds = Math.floor((Date.now() / 1000) - timestamp);
        if (seconds < 60) return 'just now';
        if (seconds < 3600) return Math.floor(seconds / 60) + 'm ago';
        if (seconds < 86400) return Math.floor(seconds / 3600) + 'h ago';
        if (seconds < 604800) return Math.floor(seconds / 86400) + 'd ago';
        return Math.floor(seconds / 604800) + 'w ago';
    }
    document.querySelectorAll('[data-time]').forEach(el => {
        el.textContent = timeAgo(parseInt(el.dataset.time));
    });
    </script>
</body>
</html>
{{end}}
