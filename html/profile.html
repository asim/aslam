{{define "profile.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Aslam</title>
    {{template "style"}}
    <style>
        .profile-card {
            max-width: 500px;
        }
        .profile-picture {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: #999;
            margin-bottom: 16px;
            overflow: hidden;
        }
        .profile-picture img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .profile-form label {
            display: block;
            margin-top: 16px;
            font-size: 13px;
            color: #666;
        }
        .profile-form input {
            width: 100%;
            padding: 10px 14px;
            margin-top: 4px;
            border: 1px solid #999;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
        }
        .profile-form input:focus { outline: none; border-color: #333; }
        .profile-form input[disabled] { background: #f5f5f5; color: #888; }
        .profile-form button {
            margin-top: 20px;
            padding: 10px 24px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .profile-form button:hover { background: #333; }
        .profile-meta {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
        .success { color: #16a34a; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="app">
        {{template "header"}}
        <main class="app-content">
            <h2>Profile</h2>

            {{if .Message}}
            <p class="success">{{.Message}}</p>
            {{end}}

            <div class="profile-card">
                <div class="profile-picture">
                    {{if .User.Picture}}
                    <img src="{{.User.Picture}}" alt="Profile picture">
                    {{else}}
                    {{slice .User.Email 0 1}}
                    {{end}}
                </div>

                <form method="POST" action="/profile" class="profile-form">
                    <label>Name
                        <input type="text" name="name" value="{{.User.Name}}" placeholder="Your name">
                    </label>
                    <label>Email
                        <input type="email" value="{{.User.Email}}" disabled>
                    </label>
                    <label>Role
                        <input type="text" value="{{.User.Role}}" disabled>
                    </label>
                    <button type="submit">Save</button>
                </form>

                <div class="profile-meta">
                    Member since {{.User.CreatedAt.Format "January 2006"}}
                </div>
            </div>
        </main>
    </div>
</body>
</html>
{{end}}
