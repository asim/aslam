{{define "ghazali.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{index . "Chapter"}} - Aslam</title>
    {{template "style"}}
    <style>
        .gh-volume {
            display: inline-block;
            font-size: 12px;
            background: #f0f0f0;
            padding: 2px 10px;
            border-radius: 4px;
            margin-bottom: 8px;
        }
        .gh-chapter {
            font-size: 17px;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 20px;
        }
        .gh-content {
            line-height: 1.8;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .gh-source {
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="app">
        {{template "header" .}}
        <main class="app-content">
            <p style="margin-bottom: 12px"><a href="/search" style="font-size: 13px; color: #888;">&larr; back to search</a></p>
            <span class="gh-volume">{{index . "VolumeTitle"}}</span>
            <h2 class="gh-chapter">{{index . "Chapter"}}</h2>
            <div class="gh-content">{{index . "Content"}}</div>
            <div class="gh-source">Source: Imam Al-Ghazali, Ihya Ulum al-Din (Revival of the Islamic Sciences)</div>
        </main>
    </div>
</body>
</html>
{{end}}
